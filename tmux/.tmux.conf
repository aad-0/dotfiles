# set -g default-terminal "tmux-256color"
# set -g default-terminal "screen-256color"
set -g default-terminal "xterm-256color"

set -ga terminal-overrides ',xterm-256color:Tc'
# set -g default-terminal "tmux-256color"
# set -g default-terminal "xterm-256color"
# set -as terminal-overrides ',xterm*:sitm=\E[3m'

# set -g default-terminal "xterm"
setw -g mode-keys vi
set -g escape-time 10
set-window-option -g automatic-rename off
set -g allow-rename off
set -g status-left '#{window_index}: #{window_name}<#{window_flags}>'
set -g status-left-length 50
# set -g status-right '#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}#{=21:pane_title}-#(exec basename $(echo $TMUX | cut -f1 -d',')) %H:%M %d-%b-%y'
set -g status-right '#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}#{=21:pane_title}-#(exec basename $(echo $TMUX | cut -f1 -d',')) %H:%M %d-%b-%y | Continuum status: #{continuum_status}'

set -g status-right-length 200
set -g window-status-current-format ''
set -g window-status-format ''
set -g history-limit 100000
set -g automatic-rename off
set -g allow-rename off


set -g @continuum-restore 'on'
set -g @continuum-auto-save 'on'
set -g @continuum-save-interval '1'

set-option -g xterm-keys on # USER


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-sensible'

# Run plugins
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run '~/.tmux/plugins/tmux-resurrect/tmux-resurrect'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'



unbind -a
bind-key -n "M-R" respawn-pane -k
bind-key -n "M-G" set-option -g status
bind-key -n "M-N" select-pane -t :.-
bind-key -n "M-P" select-pane -t :.+
bind-key -n "M-X" kill-pane
bind-key -n "M-V" split-window -h -c '#{pane_current_path}'
bind-key -n "M-C" split-window -v -c '#{pane_current_path}'
bind-key -n "M-B" new-window -c ~/
bind-key -n "M-M" choose-tree -wZ -O time
bind-key -n "M-Y" copy-mode
bind-key -n "M-O" resize-pane -Z
bind-key -n "M-J" resize-pane -D
bind-key -n "M-H" resize-pane -L
bind-key -n "M-K" resize-pane -U
bind-key -n "M-L" resize-pane -R
bind-key -n "M-:" command-prompt


# #bind-key -T choose-tree x kill-window -t "%%"
# bind-key -T choose-tree x if -F '#{==:#{type},session}' \
#     "kill-session -t '%%'" \
#     "kill-window -t '%%'"


# --- Kill without confirmation ---
# Kill highlighted window instantly (no confirm)
# bind-key -T choose-tree x kill-window -t "%%" -y
# 
# # Kill highlighted session instantly (no confirm)
# bind-key -T choose-tree X kill-session -t "%%" -y

# Optional: instead of above two, unify with one "x" key:
bind-key -T choose-tree x if -F '#{==:#{type},session}' \
    "kill-session -t '%%' -y" \
    "kill-window -t '%%' -y"

# --- Extra actions inside chooser ---
# Detach client from highlighted session
bind-key -T choose-tree d detach-client -t "%%"

# Rename highlighted session/window
bind-key -T choose-tree r command-prompt -I "%%" \
    "if -F '#{==:#{type},session}' 'rename-session -- \"%%\"' 'rename-window -- \"%%\"'"



#set -g prefix C-a
#bind C-a send-prefix

# set -g prefix C-b
set -g prefix C-t
# bind C-b send-prefix
# bind-key -n C-a send-prefix



bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection c"
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-V send-keys -X rectangle-toggle


run '~/.tmux/plugins/tpm/tpm'
